<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator</title>
    <style>
        body {
            font-family: -apple-system, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffffff;
        }
        #search-box {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            background-color: #2a2a2a;
            color: #e0e0e0;
        }
        .news-card {
            background-color: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .news-card h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #ffffff;
        }
        .news-card p {
            color: #b0b0b0;
            line-height: 1.6;
        }
        .news-card a {
            display: inline-block;
            margin-top: 10px;
            color: #5ea0ff;
            text-decoration: none;
            font-weight: bold;
        }
        .news-card a:hover {
            text-decoration: underline;
        }
        .pagination {
            text-align: center;
            margin: 20px 0;
        }
        .pagination button {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 14px;
            margin: 0 3px;
            cursor: pointer;
            font-size: 1em;
            color: #e0e0e0;
        }
        .pagination button:hover {
            background-color: #3a3a3a;
        }
        .pagination button.active {
            background-color: #5ea0ff;
            color: #1a1a1a;
            border-color: #5ea0ff;
        }
    </style>
</head>
<body>
<h1>Meine Nachrichten</h1>

<input type="text" id="search-box" placeholder="Nachrichten durchsuchen..." oninput="handleSearch()">

<div id="news-container">Lade Nachrichten...</div>
<div id="pagination" class="pagination"></div>

<script>
    let allNews = [];
    let filteredNews = [];
    let currentPage = 1;
    const pageSize = 20;

    fetch('/api/news')
        .then(response => response.json())
        .then(newsList => {
            allNews = newsList;
            filteredNews = allNews;
            renderPage(1);
        });

    function handleSearch() {
        const query = document.getElementById('search-box').value.toLowerCase();
        filteredNews = allNews.filter(news =>
            news.title.toLowerCase().includes(query) ||
            news.summary.toLowerCase().includes(query)
        );
        renderPage(1);
    }

    function renderPage(page) {
        currentPage = page;
        const container = document.getElementById('news-container');
        container.innerHTML = '';

        const start = (page - 1) * pageSize;
        const end = start + pageSize;
        const pageNews = filteredNews.slice(start, end);

        pageNews.forEach(news => {
            const div = document.createElement('div');
            div.className = 'news-card';
            div.innerHTML =
                '<h2>' + news.title + '</h2>' +
                '<p>' + news.summary + '</p>' +
                '<a href="' + news.link + '" target="_blank">Zum Artikel →</a>';
            container.appendChild(div);
        });

        window.scrollTo(0, 0);
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredNews.length / pageSize);
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            if (i === currentPage) btn.className = 'active';
            btn.onclick = () => renderPage(i);
            pagination.appendChild(btn);
        }
    }
</script>
</body>
</html>
